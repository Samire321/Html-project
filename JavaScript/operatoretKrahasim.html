<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Operatorët e Krahasimit</title>
</head>
<body>

  <h1>Operatorët e Krahasimit në JavaScript</h1>

  <script>
    let a = 5;
    let b = 8;
    let c = 5;

    console.log("a =", a);
    console.log("b =", b);
    console.log("c =", c);

    // == barazim
    console.log("a == b:", a == b); 
    console.log("a == c:", a == c); 

    // != jo i barabartë
    console.log("a != b:", a != b); 

    // > më i madh se
    console.log("b > a:", b > a); 

    // < më i vogël se
    console.log("a < b:", a < b); 

    // >= më i madh ose i barabartë
    console.log("a >= c:", a >= c); 

    // <= më i vogël ose i barabartë
    console.log("a <= b:", a <= b); 

    // == kontrollon vetëm vlerën, === kontrollon edhe tipin
    let d = "5";
    console.log("a == d:", a == d);   
    console.log("a === d:", a === d);
  </script>

</body>
</html>
