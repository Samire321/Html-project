<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Variablat</title>
</head>
<body>

  <h1>Variablat</h1>
  <script>

    var emri = "Diellza";       
    let mosha = 16;          
    const shkolla = "Flutura Academy";


    //String
    let qyteti = "Prishtinë";
    console.log("Qyteti:", qyteti);

    // Number
    let nota = 4.5;
    console.log("Nota:", nota);

    // Boolean 
    let kaKaluar = true;
    console.log("Ka kaluar?", kaKaluar);

    // Array 
    let notat = [5, 4, 3, 4.5];
    console.log("Notat:", notat);

    // Object 
    let nxenesi = {
      emri: "Arta",
      mosha: 16,
      klasa: 11
    };
    console.log("Nxënësi:", nxenesi);

    // Null 
    let telefoni = null;
    
    console.log("Telefoni:", telefoni);

    // Undefined 
    let emaili;
    console.log("Emaili:", emaili);

    console.log("Emri:", emri);
    console.log("Mosha:", mosha);
    console.log("Shkolla:", shkolla);

  </script>

</body>
</html>
