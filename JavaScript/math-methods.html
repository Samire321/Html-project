<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Metodat Matematikore në JavaScript</title>
</head>
<body>
  <h1>Metodat matematikore në JavaScript</h1>
  <script>
    let numri = 4.7;
    let negativ = -9;

    document.write("Numri: " + numri + "<br><br>");

    // Math.round
    document.write("Math.round(4.7): " + Math.round(numri) + "<br>");

    // Math.floor
    document.write("Math.floor(4.7): " + Math.floor(numri) + "<br>");

    // Math.ceil
    document.write("Math.ceil(4.7): " + Math.ceil(numri) + "<br>");

    // Math.max
    document.write("Math.max(3, 7, 1): " + Math.max(3, 7, 1) + "<br>");
s
    // Math.min
    document.write("Math.min(3, 7, 1): " + Math.min(3, 7, 1) + "<br>");

    // Math.random
    document.write("Math.random(): " + Math.random() + "<br>");

    // Math.pow
    document.write("Math.pow(2, 3): " + Math.pow(2, 3) + "<br>");

    // Math.sqrt
    document.write("Math.sqrt(25): " + Math.sqrt(25) + "<br>");

    // Math.abs
    document.write("Math.abs(-9): " + Math.abs(negativ) + "<br>");
  </script>
</body>
</html>
