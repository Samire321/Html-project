<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Operatorët Logjik</title>
</head>
<body>

  <h1>Operatorët Logjik në JavaScript</h1>

  <script>
    let a = 5;
    let b = 10;

    console.log("a = 5, b = 10");
    
    // && - duhet të jenë të dyja të vërteta
    console.log("(a > 0 && b > 0) =", (a > 0 && b > 0));   //true
    console.log("(a > 0 && b < 5) =", (a > 0 && b < 5)); //false

    // || - mjafton që njëra të jetë e vërtetë
    console.log("(a > 0 || b < 5) =", (a > 0 || b < 5));   //true
    console.log("(a < 0 || b < 5) =", (a < 0 || b < 5));  //false

    // ! - mohon vlerën
    console.log("!(a > 0) =", !(a > 0));  
    console.log("!(b < 5) =", !(b < 5)); 
  </script>

</body>
</html>
